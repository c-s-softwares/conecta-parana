name: Deploy Frontend (Mobile)

on:
  push:
    branches:
      - main
    paths:
      - "mobile/**"
      - "infra/**"
  
permissions:
  contents: write
  packages: write

jobs:
  build-mobile:
    name: build-mobile (production)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        working-directory: mobile
        run: flutter pub get

      - name: Build APK (prod)
        working-directory: mobile
        run: flutter build apk --flavor prod -t lib/main_prod.dart --dart-define=API_BASE_URL=https://api.conectaparana.com.br

      # Gerar AAB no momento é desnecessário pois não iremos para a Play Store, quando isso ocorrer, basta descomentar os blocos de build
      # - name: Build AAB (prod)
      # working-directory: mobile
      # run: flutter build appbundle --flavor prod -t lib/main_prod.dart --dart-define=API_BASE_URL=https://api.conectaparana.com.br

      - name: Criar GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: prod-${{ github.sha }}
          name: "Production — ${{ github.sha }}"
          prerelease: true
          body: |
            Deploy automático ao mergear PR na main.
            Commit: ${{ github.sha }}
          files: |
            mobile/build/app/outputs/flutter-apk/app-prod-release.apk
          # Descomentar quando for para a Play Store:
          # mobile/build/app/outputs/bundle/prodRelease/app-prod-release.aab