name: Deploy Production

on:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write

jobs:
  deploy-db:
    name: deploy-db (production)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login no GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build e push imagem db
        uses: docker/build-push-action@v5
        with:
          context: ./infra
          file: ./infra/Dockerfile.postgis
          push: true
          platforms: linux/arm64
          tags: |
            ghcr.io/${{ github.repository_owner }}/conecta-parana-db:latest
            ghcr.io/${{ github.repository_owner }}/conecta-parana-db:${{ github.sha }}

      - name: Deploy DB na VM via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /opt/conecta-parana/production
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose -f docker-compose.production.yml pull db
            docker compose -f docker-compose.production.yml up -d db

  deploy-backend:
    name: deploy-backend (production)
    needs: deploy-db
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login no GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build e push imagem backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          platforms: linux/arm64
          tags: |
            ghcr.io/${{ github.repository_owner }}/conecta-parana-backend:latest
            ghcr.io/${{ github.repository_owner }}/conecta-parana-backend:${{ github.sha }}

      - name: Deploy na VM via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /opt/conecta-parana/production
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose -f docker-compose.production.yml pull backend
            docker compose -f docker-compose.production.yml up -d backend
            docker compose -f docker-compose.production.yml exec -T backend npx prisma migrate deploy

  deploy-admin:
    name: deploy-admin (production)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login no GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build e push imagem admin
        uses: docker/build-push-action@v5
        with:
          context: ./admin
          file: ./admin/Dockerfile
          push: true
          platforms: linux/arm64
          build-args: |
            ENVIRONMENT=production
          tags: |
            ghcr.io/${{ github.repository_owner }}/conecta-parana-admin:latest
            ghcr.io/${{ github.repository_owner }}/conecta-parana-admin:${{ github.sha }}

      - name: Deploy na VM via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /opt/conecta-parana/production
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose -f docker-compose.production.yml pull admin
            docker compose -f docker-compose.production.yml up -d admin

  build-mobile:
    name: build-mobile (production)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        working-directory: mobile
        run: flutter pub get

      - name: Build APK (prod)
        working-directory: mobile
        run: flutter build apk --flavor prod -t lib/main_prod.dart --dart-define=API_BASE_URL=https://api.conectaparana.com.br

      # Gerar AAB no momento é desnecessário pois não iremos para a Play Store, quando isso ocorrer, basta descomentar os blocos de build
      # - name: Build AAB (prod)
      # working-directory: mobile
      # run: flutter build appbundle --flavor prod -t lib/main_prod.dart --dart-define=API_BASE_URL=https://api.conectaparana.com.br

      - name: Criar GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: prod-${{ github.sha }}
          name: "Production — ${{ github.sha }}"
          prerelease: true
          body: |
            Deploy automático ao mergear PR na main.
            Commit: ${{ github.sha }}
          files: |
            mobile/build/app/outputs/flutter-apk/app-prod-release.apk
          # Descomentar quando for para a Play Store:
          # mobile/build/app/outputs/bundle/prodRelease/app-prod-release.aab