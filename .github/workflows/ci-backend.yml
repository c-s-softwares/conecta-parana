name: CI Backend

on:
  pull_request:
    branches:
      - main
    paths:
      - "backend/**"

jobs:
  lint:
    name: lint (backend)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

  test-unit:
    name: test-unit (backend)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm run test -- --coverage

  test-e2e:
    name: test-e2e (backend)
    needs: [lint, test-unit]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: conecta_test
          POSTGRES_PASSWORD: conecta_test
          POSTGRES_DB: conecta_parana_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U conecta_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://conecta_test:conecta_test@localhost:5432/conecta_parana_test

      - name: Run e2e tests
        run: npm run test:e2e
        env:
          DATABASE_URL: postgresql://conecta_test:conecta_test@localhost:5432/conecta_parana_test
          NODE_ENV: test
          PORT: 3000
          CORS_ORIGIN: http://localhost:3000
          THROTTLE_TTL: 60
          THROTTLE_LIMIT: 10