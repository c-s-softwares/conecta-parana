name: Deploy Frontend (Admin)

on:
  push:
    branches:
      - main
    paths:
      - "admin/**"
      - "infra/**"
  
permissions:
  contents: write
  packages: write

jobs:
  deploy-admin:
    name: deploy-admin (production)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login no GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build e push imagem admin
        uses: docker/build-push-action@v5
        with:
          context: ./admin
          file: ./admin/Dockerfile
          push: true
          platforms: linux/arm64
          build-args: |
            ENVIRONMENT=production
          tags: |
            ghcr.io/${{ github.repository_owner }}/conecta-parana-admin:latest
            ghcr.io/${{ github.repository_owner }}/conecta-parana-admin:${{ github.sha }}

      - name: Deploy na VM via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /opt/conecta-parana/production
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose -f docker-compose.production.yml pull admin
            docker compose -f docker-compose.production.yml up -d admin