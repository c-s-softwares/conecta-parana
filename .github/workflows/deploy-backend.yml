name: Deploy Backend

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "infra/**"
  
permissions:
  contents: write
  packages: write

jobs:
  deploy-db:
    name: deploy-db (production)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login no GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build e push imagem db
        uses: docker/build-push-action@v5
        with:
          context: ./infra
          file: ./infra/Dockerfile.postgis
          push: true
          platforms: linux/arm64
          tags: |
            ghcr.io/${{ github.repository_owner }}/conecta-parana-db:latest
            ghcr.io/${{ github.repository_owner }}/conecta-parana-db:${{ github.sha }}

      - name: Deploy DB na VM via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /opt/conecta-parana/production
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose -f docker-compose.production.yml pull db
            docker compose -f docker-compose.production.yml up -d db

  deploy-backend:
    name: deploy-backend (production)
    needs: deploy-db
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login no GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build e push imagem backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          platforms: linux/arm64
          tags: |
            ghcr.io/${{ github.repository_owner }}/conecta-parana-backend:latest
            ghcr.io/${{ github.repository_owner }}/conecta-parana-backend:${{ github.sha }}

      - name: Deploy na VM via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /opt/conecta-parana/production
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose -f docker-compose.production.yml pull backend
            docker compose -f docker-compose.production.yml up -d backend
            docker compose -f docker-compose.production.yml exec -T backend npx prisma migrate deploy