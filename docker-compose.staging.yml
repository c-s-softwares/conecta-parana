services:
  db:
    image: ghcr.io/${GITHUB_ORG}/conecta-parana-db:staging
    container_name: conecta_db_staging
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_staging:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - conecta_staging_network

  backend:
    image: ghcr.io/${GITHUB_ORG}/conecta-parana-backend:staging
    container_name: conecta_backend_staging
    restart: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      NODE_ENV: staging
      PORT: 3000
    depends_on:
      db:
        condition: service_healthy
    networks:
      - conecta_staging_network

  admin:
    image: ghcr.io/${GITHUB_ORG}/conecta-parana-admin:staging
    container_name: conecta_admin_staging
    restart: always
    ports:
      - "4200:80"
    networks:
      - conecta_staging_network

volumes:
  postgres_staging:

networks:
  conecta_staging_network:
    driver: bridge