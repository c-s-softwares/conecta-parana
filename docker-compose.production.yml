services:
  db:
    image: ghcr.io/${GITHUB_ORG}/conecta-parana-db:latest
    container_name: conecta_db_prod
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - conecta_prod_network

  redis:
    image: redis:7-alpine
    container_name: conecta_redis_prod
    restart: always
    volumes:
      - redis_prod:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - conecta_prod_network

  backend:
    image: ghcr.io/${GITHUB_ORG}/conecta-parana-backend:latest
    container_name: conecta_backend_prod
    restart: always
    ports:
      - "3001:3000"
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      REDIS_URL: redis://redis:6379
      GLITCHTIP_DSN: ${GLITCHTIP_DSN}
      NODE_ENV: production
      PORT: 3000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - conecta_prod_network

  admin:
    image: ghcr.io/${GITHUB_ORG}/conecta-parana-admin:latest
    container_name: conecta_admin_prod
    restart: always
    ports:
      - "4201:80"
    networks:
      - conecta_prod_network

  # ── GlitchTip (APM / Error Tracking) ──────────────────────
  glitchtip-db:
    image: postgres:16-alpine
    container_name: conecta_glitchtip_db_prod
    restart: always
    environment:
      POSTGRES_USER: ${GLITCHTIP_DB_USER}
      POSTGRES_PASSWORD: ${GLITCHTIP_DB_PASSWORD}
      POSTGRES_DB: ${GLITCHTIP_DB_NAME}
    volumes:
      - glitchtip_db_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${GLITCHTIP_DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - conecta_prod_network

  glitchtip-web:
    image: glitchtip/glitchtip:latest
    container_name: conecta_glitchtip_web_prod
    restart: always
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://${GLITCHTIP_DB_USER}:${GLITCHTIP_DB_PASSWORD}@glitchtip-db:5432/${GLITCHTIP_DB_NAME}
      REDIS_URL: redis://redis:6379/1
      SECRET_KEY: ${GLITCHTIP_SECRET_KEY}
      GLITCHTIP_DOMAIN: ${GLITCHTIP_DOMAIN}
      DEFAULT_FROM_EMAIL: noreply@conectaparana.com.br
      EMAIL_URL: consolemail://
      ENABLE_USER_REGISTRATION: "false"
      ENABLE_ORGANIZATION_CREATION: "false"
      CELERY_WORKER_AUTOSCALE: "1,3"
      UWSGI_WORKERS: "4"
    depends_on:
      glitchtip-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/_health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - conecta_prod_network

  glitchtip-worker:
    image: glitchtip/glitchtip:latest
    container_name: conecta_glitchtip_worker_prod
    restart: always
    command: ./bin/run-celery-with-beat.sh
    environment:
      DATABASE_URL: postgres://${GLITCHTIP_DB_USER}:${GLITCHTIP_DB_PASSWORD}@glitchtip-db:5432/${GLITCHTIP_DB_NAME}
      REDIS_URL: redis://redis:6379/1
      SECRET_KEY: ${GLITCHTIP_SECRET_KEY}
      CELERY_WORKER_AUTOSCALE: "1,3"
    depends_on:
      glitchtip-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - conecta_prod_network

volumes:
  postgres_prod:
  redis_prod:
  glitchtip_db_prod:

networks:
  conecta_prod_network:
    driver: bridge
