services:
  db:
    image: ghcr.io/${GITHUB_ORG}/conecta-parana-db:latest
    container_name: conecta_db_prod
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - conecta_prod_network

  redis:
    image: redis:7-alpine
    container_name: conecta_redis_prod
    restart: always
    volumes:
      - redis_prod:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - conecta_prod_network

  backend:
    image: ghcr.io/${GITHUB_ORG}/conecta-parana-backend:latest
    container_name: conecta_backend_prod
    restart: always
    ports:
      - "3001:3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
      PORT: 3000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - conecta_prod_network

  admin:
    image: ghcr.io/${GITHUB_ORG}/conecta-parana-admin:latest
    container_name: conecta_admin_prod
    restart: always
    ports:
      - "4201:80"
    networks:
      - conecta_prod_network

volumes:
  postgres_prod:
  redis_prod:

networks:
  conecta_prod_network:
    driver: bridge
