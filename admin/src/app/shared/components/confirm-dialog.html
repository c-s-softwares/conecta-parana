@if (visible()) {
  <div class="fixed inset-0 z-50 flex items-center justify-center bg-black/50">
    <div class="mx-4 w-full max-w-md rounded-lg bg-white p-6">
      <h2 class="mb-2 text-lg font-bold text-gray-900">{{ title() }}</h2>
      <p class="mb-6 text-sm text-gray-600">{{ message() }}</p>
      <div class="flex justify-end gap-3">
        <button
          type="button"
          (click)="cancelled.emit()"
          class="cursor-pointer rounded-lg bg-btn-create px-5 py-2 text-sm font-bold text-white transition-colors hover:bg-btn-create-hover"
        >
          Cancelar
        </button>
        <button
          type="button"
          (click)="confirmed.emit()"
          class="cursor-pointer rounded-lg bg-btn-cancel px-5 py-2 text-sm font-bold text-white transition-colors hover:bg-btn-cancel-hover"
        >
          Excluir
        </button>
      </div>
    </div>
  </div>
}
