<div>
  <label [for]="fieldId()" class="mb-1 block text-sm font-bold text-gray-800">
    {{ label() }}
    @if (required()) {
      <span class="text-red-600">*</span>
    }
  </label>
  <ng-content />
  @if (showError()) {
    <p class="mt-1 text-xs text-red-600">{{ errorMessage() }}</p>
  }
</div>
