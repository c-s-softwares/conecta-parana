@if (view() === 'list') {
  <app-page-header
    title="POSTAGENS"
    buttonLabel="Criar postagem"
    (create)="openForm()"
  />

  <div class="mt-6 space-y-4">
    @if (posts().length === 0) {
      <div class="rounded-lg bg-form-bg p-5 text-sm font-medium text-gray-800">
        Nenhuma postagem cadastrada até o momento.
      </div>
    } @else {
      @for (post of posts(); track post.id) {
        <div class="rounded-lg bg-form-bg p-5 shadow-sm">
          <div class="flex items-start justify-between gap-4">
            <div class="min-w-0">
              <h2 class="text-lg font-bold text-gray-900">{{ post.title }}</h2>
              <p class="mt-2 text-sm text-gray-700">{{ post.description }}</p>

              <span
                class="mt-3 inline-block rounded-md bg-input-bg px-3 py-1 text-xs font-semibold uppercase text-gray-800"
              >
                {{ post.category }}
              </span>
            </div>

            <div class="flex shrink-0 gap-2">
              <button
                type="button"
                (click)="onEdit(post)"
                class="rounded-lg bg-white px-4 py-2 text-sm font-bold text-gray-900 transition-colors hover:bg-gray-200 cursor-pointer"
              >
                Editar
              </button>

              <button
                type="button"
                (click)="onDelete(post.id)"
                class="rounded-lg bg-btn-cancel px-4 py-2 text-sm font-bold text-white transition-colors hover:bg-btn-cancel-hover cursor-pointer"
              >
                Excluir
              </button>
            </div>
          </div>
        </div>
      }
    }
  </div>
} @else {
  <app-form-container [title]="formTitle">
    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-5">
      <app-form-field
        label="Título"
        fieldId="title"
        [required]="true"
        [showError]="titleTouched && !!titleError"
        [errorMessage]="titleError"
      >
        <input
          id="title"
          formControlName="title"
          type="text"
          placeholder="Digite o título da postagem"
          class="w-full rounded-md border-0 bg-input-bg px-3 py-2 text-sm text-gray-900 placeholder:text-gray-500 focus:outline-none focus:ring-2 focus:ring-primary"
        />
      </app-form-field>

      <app-form-field
        label="Descrição"
        fieldId="description"
        [required]="true"
        [showError]="descriptionTouched && !!descriptionError"
        [errorMessage]="descriptionError"
      >
        <textarea
          id="description"
          formControlName="description"
          rows="4"
          placeholder="Digite a descrição da postagem"
          class="w-full rounded-md border-0 bg-input-bg px-3 py-2 text-sm text-gray-900 placeholder:text-gray-500 focus:outline-none focus:ring-2 focus:ring-primary"
        ></textarea>
      </app-form-field>

      <app-form-field
        label="Categoria"
        fieldId="category"
        [required]="true"
        [showError]="categoryTouched && !!categoryError"
        [errorMessage]="categoryError"
      >
        <select
          id="category"
          formControlName="category"
          class="w-full rounded-md border-0 bg-input-bg px-3 py-2 text-sm text-gray-900 focus:outline-none focus:ring-2 focus:ring-primary cursor-pointer"
        >
          <option value="">Selecione a categoria da postagem</option>

          @for (category of categories; track category.value) {
            <option [value]="category.value">{{ category.label }}</option>
          }
        </select>
      </app-form-field>

      <div class="flex justify-end gap-3 pt-2">
        <button
          type="button"
          (click)="closeForm()"
          class="rounded-lg bg-btn-cancel px-5 py-2 text-sm font-bold text-white transition-colors hover:bg-btn-cancel-hover cursor-pointer"
        >
          Cancelar
        </button>

        <button
          type="submit"
          class="rounded-lg bg-btn-create px-5 py-2 text-sm font-bold text-white transition-colors hover:bg-btn-create-hover cursor-pointer"
        >
          {{ submitButtonLabel }}
        </button>
      </div>
    </form>
  </app-form-container>
}
