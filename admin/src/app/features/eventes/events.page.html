@if (view() === 'list') {
  <app-page-header title="EVENTOS" buttonLabel="Criar evento" (create)="openForm()" />
  <!-- TODO: listar eventos da API -->
} @else {
  <app-form-container title="CRIAR EVENTO">
    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-5">

      <!-- Título / Tipo -->
      <div class="grid grid-cols-2 gap-4">
        <app-form-field
          label="Título"
          fieldId="title"
          [required]="true"
          [showError]="titleTouched && !!titleError"
          [errorMessage]="titleError"
        >
          <input
            id="title"
            formControlName="title"
            type="text"
            placeholder="Digite o título do evento"
            class="w-full rounded-md border-0 bg-input-bg px-3 py-2 text-sm text-gray-900 placeholder:text-gray-500 focus:outline-none focus:ring-2 focus:ring-primary"
          />
        </app-form-field>

        <app-form-field
          label="Tipo"
          fieldId="type"
          [required]="true"
          [showError]="typeTouched && !!typeError"
          [errorMessage]="typeError"
        >
          <select
            id="type"
            formControlName="type"
            class="w-full rounded-md border-0 bg-input-bg px-3 py-2 text-sm text-gray-900 focus:outline-none focus:ring-2 focus:ring-primary"
          >
            <option value="" disabled>Selecione...</option>
            @for (t of eventTypes; track t.value) {
              <option [value]="t.value">{{ t.label }}</option>
            }
          </select>
        </app-form-field>
      </div>

      <!-- Descrição -->
      <app-form-field
        label="Descrição"
        fieldId="description"
        [required]="true"
        [showError]="descriptionTouched && !!descriptionError"
        [errorMessage]="descriptionError"
      >
        <textarea
          id="description"
          formControlName="description"
          rows="4"
          placeholder="Digite a descrição do evento"
          class="w-full rounded-md border-0 bg-input-bg px-3 py-2 text-sm text-gray-900 placeholder:text-gray-500 focus:outline-none focus:ring-2 focus:ring-primary"
        ></textarea>
      </app-form-field>

      <!-- Data do Evento / Categoria -->
      <div class="grid grid-cols-2 gap-4">
        <app-form-field
          label="Data do Evento"
          fieldId="event_date"
          [required]="false"
          [showError]="eventDateTouched && !!eventDateError"
          [errorMessage]="eventDateError"
        >
          <input
            id="event_date"
            formControlName="event_date"
            type="datetime-local"
            class="w-full rounded-md border-0 bg-input-bg px-3 py-2 text-sm text-gray-900 placeholder:text-gray-500 focus:outline-none focus:ring-2 focus:ring-primary"
          />
        </app-form-field>

        <app-form-field
          label="Categoria"
          fieldId="category_id"
          [required]="false"
          [showError]="false"
          [errorMessage]="''"
        >
          <select
            id="category_id"
            formControlName="category_id"
            class="w-full rounded-md border-0 bg-input-bg px-3 py-2 text-sm text-gray-900 focus:outline-none focus:ring-2 focus:ring-primary"
          >
            <option value="">Selecione...</option>
            <!-- TODO: carregar categorias da API -->
          </select>
        </app-form-field>
      </div>

      <!-- Latitude / Longitude -->
      <div class="grid grid-cols-2 gap-4">
        <app-form-field
          label="Latitude"
          fieldId="latitude"
          [required]="false"
          [showError]="latitudeTouched && !!latitudeError"
          [errorMessage]="latitudeError"
        >
          <input
            id="latitude"
            formControlName="latitude"
            type="number"
            step="any"
            placeholder="-23.4253"
            class="w-full rounded-md border-0 bg-input-bg px-3 py-2 text-sm text-gray-900 placeholder:text-gray-500 focus:outline-none focus:ring-2 focus:ring-primary"
          />
        </app-form-field>

        <app-form-field
          label="Longitude"
          fieldId="longitude"
          [required]="false"
          [showError]="longitudeTouched && !!longitudeError"
          [errorMessage]="longitudeError"
        >
          <input
            id="longitude"
            formControlName="longitude"
            type="number"
            step="any"
            placeholder="-51.9383"
            class="w-full rounded-md border-0 bg-input-bg px-3 py-2 text-sm text-gray-900 placeholder:text-gray-500 focus:outline-none focus:ring-2 focus:ring-primary"
          />
        </app-form-field>
      </div>

      <!-- Local (opcional) -->
      <app-form-field
        label="Local (opcional)"
        fieldId="local_id"
        [required]="false"
        [showError]="false"
        [errorMessage]="''"
      >
        <select
          id="local_id"
          formControlName="local_id"
          class="w-full rounded-md border-0 bg-input-bg px-3 py-2 text-sm text-gray-900 focus:outline-none focus:ring-2 focus:ring-primary"
        >
          <option value="">Selecione um local...</option>
          <!-- TODO: carregar locais da API -->
        </select>
      </app-form-field>

      <!-- Fotos -->
      <div>
        <p class="mb-1 text-sm font-bold text-gray-800">Fotos</p>
        <div
          class="flex cursor-pointer items-center justify-center rounded-md border-2 border-dashed border-gray-400 bg-input-bg px-4 py-6 text-sm text-gray-500 transition-colors hover:border-primary hover:text-primary"
          role="button"
          tabindex="0"
          (dragover)="onDragOver($event)"
          (drop)="onDrop($event)"
          (click)="photoInput.click()"
          (keydown.enter)="photoInput.click()"
          (keydown.space)="photoInput.click()"
        >
          <span>📎 Arraste ou clique para adicionar fotos</span>
          <input
            #photoInput
            type="file"
            accept="image/jpeg,image/png,image/webp"
            multiple
            class="hidden"
            (change)="onPhotosSelected($event)"
          />
        </div>

        <!-- Erros de arquivo -->
        @if (photoErrors().length > 0) {
          <ul class="mt-2 space-y-1">
            @for (err of photoErrors(); track err) {
              <li class="text-xs text-red-600">{{ err }}</li>
            }
          </ul>
        }

        <!-- Chips dos arquivos selecionados -->
        @if (photos().length > 0) {
          <div class="mt-3 flex flex-wrap gap-2">
            @for (photo of photos(); track photo.name; let i = $index) {
              <span
                class="flex items-center gap-1 rounded-full bg-gray-200 px-3 py-1 text-xs text-gray-700"
              >
                {{ photo.name }}
                <button
                  type="button"
                  (click)="removePhoto(i)"
                  class="ml-1 text-gray-500 hover:text-red-600 cursor-pointer"
                  aria-label="Remover foto"
                >
                  ✕
                </button>
              </span>
            }
          </div>
        }
      </div>

      <!-- Ações -->
      <div class="flex justify-end gap-3 pt-2">
        <button
          type="button"
          (click)="closeForm()"
          class="rounded-lg bg-btn-cancel px-5 py-2 text-sm font-bold text-white transition-colors hover:bg-btn-cancel-hover cursor-pointer"
        >
          Cancelar
        </button>
        <button
          type="submit"
          class="rounded-lg bg-btn-create px-5 py-2 text-sm font-bold text-white transition-colors hover:bg-btn-create-hover cursor-pointer"
        >
          Criar Evento
        </button>
      </div>

    </form>
  </app-form-container>
}
