services:
  db:
    build:
      context: ./infra
      dockerfile: Dockerfile.postgis
    container_name: conecta_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - conecta_network

  redis:
    image: redis:7-alpine
    container_name: conecta_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - conecta_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: conecta_backend
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      REDIS_URL: redis://redis:6379
      NODE_ENV: development
      PORT: 3000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - conecta_network

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile.dev
    container_name: conecta_admin
    ports:
      - "4200:4200"
    volumes:
      - ./admin:/app
      - /app/node_modules
    networks:
      - conecta_network

volumes:
  postgres_data:
  redis_data:

networks:
  conecta_network:
    driver: bridge
