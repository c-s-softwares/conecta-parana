services:
  db:
    build:
      context: ./infra
      dockerfile: Dockerfile.postgis
    container_name: conecta_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - conecta_network

  redis:
    image: redis:7-alpine
    container_name: conecta_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - conecta_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: conecta_backend
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      REDIS_URL: redis://redis:6379
      GLITCHTIP_DSN: ${GLITCHTIP_DSN:-}
      NODE_ENV: development
      PORT: 3000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - conecta_network

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile.dev
    container_name: conecta_admin
    ports:
      - "4200:4200"
    volumes:
      - ./admin:/app
      - /app/node_modules
    networks:
      - conecta_network

  # ── GlitchTip (APM / Error Tracking) ──────────────────────
  # Banco separado para o GlitchTip (não mistura com o app)
  glitchtip-db:
    image: postgres:16-alpine
    container_name: conecta_glitchtip_db
    environment:
      POSTGRES_USER: ${GLITCHTIP_DB_USER:-glitchtip}
      POSTGRES_PASSWORD: ${GLITCHTIP_DB_PASSWORD:-glitchtip_dev}
      POSTGRES_DB: ${GLITCHTIP_DB_NAME:-glitchtip}
    volumes:
      - glitchtip_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${GLITCHTIP_DB_USER:-glitchtip}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - conecta_network

  glitchtip-web:
    image: glitchtip/glitchtip:latest
    container_name: conecta_glitchtip_web
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://${GLITCHTIP_DB_USER:-glitchtip}:${GLITCHTIP_DB_PASSWORD:-glitchtip_dev}@glitchtip-db:5432/${GLITCHTIP_DB_NAME:-glitchtip}
      REDIS_URL: redis://redis:6379/1
      SECRET_KEY: ${GLITCHTIP_SECRET_KEY:-change-me-to-a-random-string-in-production}
      GLITCHTIP_DOMAIN: ${GLITCHTIP_DOMAIN:-http://localhost:8080}
      DEFAULT_FROM_EMAIL: noreply@conectaparana.com.br
      EMAIL_URL: consolemail://
      ENABLE_USER_REGISTRATION: "false"
      ENABLE_ORGANIZATION_CREATION: "false"
      CELERY_WORKER_AUTOSCALE: "1,3"
      UWSGI_WORKERS: "2"
    depends_on:
      glitchtip-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/_health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - conecta_network

  glitchtip-worker:
    image: glitchtip/glitchtip:latest
    container_name: conecta_glitchtip_worker
    command: ./bin/run-celery-with-beat.sh
    environment:
      DATABASE_URL: postgres://${GLITCHTIP_DB_USER:-glitchtip}:${GLITCHTIP_DB_PASSWORD:-glitchtip_dev}@glitchtip-db:5432/${GLITCHTIP_DB_NAME:-glitchtip}
      REDIS_URL: redis://redis:6379/1
      SECRET_KEY: ${GLITCHTIP_SECRET_KEY:-change-me-to-a-random-string-in-production}
      CELERY_WORKER_AUTOSCALE: "1,3"
    depends_on:
      glitchtip-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - conecta_network

volumes:
  postgres_data:
  redis_data:
  glitchtip_db_data:

networks:
  conecta_network:
    driver: bridge
